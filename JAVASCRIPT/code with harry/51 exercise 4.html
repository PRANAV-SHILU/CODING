<body>
    setInterval

    <div id="time"></div>

    <script>

        setInterval(()=> {
            let a = new Date()
            let h = a.getHours();
            let m = a.getMinutes()
            let s = a.getSeconds()
            let d = a.getDate()

            console.clear()
            console.log(a, d, (h - 12), m, s)

            // document.write(`${h}:${m}:${s} <br>`)        

            time.innerHTML = `${h - 12}:${m}:${s} <br>`
        }, 1000)

    </script>
</body>
