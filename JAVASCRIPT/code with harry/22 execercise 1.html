<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <script>
      // generate a random numberand guess it

      // const random = Math.random(); //  generates random number between 0 to 1

      const random = Math.floor(Math.random() * 100) + 1; // generates random number between 1 to 100
      // let say random = 0.333*100 = 33.3+1 = 34.3 floor=34 ( 1 because if 0 then num=1)

      let guess,
        attempt = 0;

      do {
        guess = prompt("Enter number to guess");
        attempt++;

        if (guess == random)
          alert(
            "Yahoo! You guessed the correct number \nCorrect number : " +
              random +
              "\nyou achieved " +
              attempt +
              " rank",
          );
        else if (random < guess)
          alert(
            "Correct number is less than " +
              guess +
              "\nRemaining attempt : " +
              (100 - attempt),
          );
        else
          alert(
            "Correct number is greater than " +
              guess +
              "\nRemaining attempt : " +
              (100 - attempt),
          );
      } while (guess != random);
    </script>
  </body>
</html>
