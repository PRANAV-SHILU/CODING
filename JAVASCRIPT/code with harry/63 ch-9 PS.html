    <script>
        // q-1 loadscript using promise

        const loadscript = async (src) => {

            return new Promise((resolve, reject) => {

                let script = document.createElement("script")
                script.src = src
                // document.head.appendChild(script) //this works only for element
                document.head.append(script) //this can work for string and element , can tech multiple args
                script.onload = () => {
                    resolve(src)
                }
            })
        }
