<body>
    <script>

        // strings are immutable, not changable

        let name ="pranav"
        console.log(name,name.length,name[0],name[1])

        let friend = 'Harry'
        console.log(friend,friend.length,friend[0],friend[1])


        //template literals
        let sentance = `${name} is a friend of ${friend}`
        console.log(sentance)
        

        //Escape squence character
        let fruit = 'Bann\'na'  //give ' when want to use in string, can use \",\n,\t - one space
        console.log(fruit)


    </script>
