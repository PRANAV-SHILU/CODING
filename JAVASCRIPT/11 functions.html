<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>

        console.log("Introduction to Functions")

        function avg(x, y) {
            return (x + y / 2)
        }

        let x = 1, y = 2, z = 3;

        console.log(avg(x, y))
        console.log(avg(x, z))
        console.log(avg(z, y))
        console.log(avg)   // prints function code



        //arrow function
        console.log("arrow function")

        const sum = (a, b) => {   // without argument : const sum = () =>{}
            return a + b
        }  // sum is not a variable it is a function

        console.log(sum(x, y))  //print returned value
        console.log(sum)        // prints function code

    </script>
</body>

</html>
