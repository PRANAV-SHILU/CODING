<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>geolocation</title>
</head>

<body>

    <p>Click the button to get your Location : </p>

    <button onclick="getlocation()">Get Location</button>

    <p id="result"></p>



    <script type="text/javascript">

        var x = document.getElementById("result");

        function getlocation()
        {
            if (navigator.geolocation)
            {
                navigator.geolocation.getCurrentPosition(showposition, showerror);
            }
            else
            {
                x.innerHTML = "Geo Location is not supported by the browser."
            }
        }

        function showposition(position)
        {
            x.innerHTML = "Latitude : " + position.coords.latitude + "<br> Longitude : "
            + position.coords.longitude;
        }

        function showerror(error)
        {

            switch (error.code)
            {
                case error.PERMISSION_DENIED:
                    x.innerHTML = "User has denied request for geolocation"
                    break;

                case error.POSITION_UNAVAILABLE:
                    x.innerHTML = "Location is unavailable for you"
                    break;

                case error.TIMEOUT:
                    x.innerHTML = "Request Timeout"
                    break;

                case error.UNKNOWN_ERROR:
                    x.innerHTML = "An Unknown error Occured"
                    break;
            }
        }


    </script>

</body>

</html>
