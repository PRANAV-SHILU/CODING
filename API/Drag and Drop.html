<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag and Drop</title>
    <style>
        #div1 {
            width: 400px;
            height: 300px;
            padding: 10px;
            border: 2px solid red;
        }
    </style>
</head>

<body>

    <img src="search.png" height="300px" width="400px" id="drag1" draggable="true" ondragstart="drag(event)">

    <div id="div1" ondrop="drop(event)" ondragover="allowdrop(event)">

        <span id="dropText">Drop the image here</span>

    </div>


    <script>
        function drag(e) {
            e.dataTransfer.setData("Text", e.target.id);
        }

        function allowdrop(e) {
            e.preventDefault();
        }

        function drop(e) {

            e.preventDefault();

            var data = e.dataTransfer.getData("Text");
            e.target.appendChild(document.getElementById(data));


            // Hide the drop text
            document.getElementById("dropText").style.display = "none";

            // Display a message
            e.target.innerHTML += '<p style="color:green; font-weight:bold;">Image dropped!</p>';

            // Change styles
            e.target.style.border = '2px solid green';
            e.target.style.background = '#eaffea';
        }
    </script>

</body>

</html>
