<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COUNTER API WITH SESSION STORAGE</title>
</head>
<body>
    <!-- this is not session storage code from learnvern -->

    <h2>Counter (Saved in Session)</h2>

    <h1 id="counter"></h1>

    <button onclick="start()">start Counter</button>
    <button onclick="stop()">stop Counter</button>
    
    <script>

        var count=sessionStorage.getItem("count") || 0;

        var run = null;

        function start()
        {
            if(run==null)
            {
                run=setInterval(update,500);
            }
        }

        function stop()
        {
            clearInterval(run);
            run=null;
        }

        function update()
        {
            count++;

            document.getElementById("counter").innerHTML=count;

            sessionStorage.setItem("count",count)
        }

    </script>
</body>
</html>
